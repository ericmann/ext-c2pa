name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # NOTE: setting RUSTFLAGS replaces .cargo/config.toml's rustflags arrays.
  # Acceptable in CI (correctness never depends on per-repo codegen flags);
  # release.yml re-asserts any shipped-binary flags via X86_RUSTFLAGS in
  # .ext-template.conf.
  RUSTFLAGS: -D warnings
  # Opt every JavaScript-based action into the Node 24 runtime ahead of
  # GitHub's June 2026 forced cut-over. `actions/checkout@v4` and the
  # rust-toolchain / setup-php / rust-cache actions all still ship Node
  # 20 bundles; without this, each run emits a "Node.js 20 actions are
  # deprecated" warning per leg. Once the upstream actions ship Node-24
  # bundles natively, this line can drop.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libclang-dev

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: none
          coverage: none

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (PHP ${{ matrix.php }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]   # macos-14 is the arm64 runner
        # 8.5 is the current stable; 8.4 is the most-deployed; 8.3 is
        # security-only through end of 2026 but still widely installed.
        php: ['8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libclang-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        # `true` when the extension needs nothing beyond Xcode CLT.
        run: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
          coverage: none

      - name: Fetch run-tests.php
        run: |
          PHP_VERSION=$(php -r 'echo PHP_VERSION;')
          curl -sSL "https://raw.githubusercontent.com/php/php-src/PHP-${PHP_VERSION%.*}/run-tests.php" -o run-tests.php
          test -s run-tests.php

      - uses: dtolnay/rust-toolchain@stable

      # `ext-php-rs` generates PHP-version-specific FFI bindings during its
      # build script — those bindings are baked into the cached `target/`
      # tree. The default rust-cache key doesn't include the matrix PHP
      # version, so without this scoping the PHP 8.3 leg primes the cache
      # and the PHP 8.4 leg restores PHP-8.3-bound artifacts, which then
      # fail to load into a PHP 8.4 process at runtime.
      - uses: Swatinem/rust-cache@v2
        with:
          key: php-${{ matrix.php }}

      - name: Build
        run: cargo build --verbose

      - name: Sanity-load the extension
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then SUFFIX=dylib; else SUFFIX=so; fi
          EXT="$PWD/target/debug/libc2pa.$SUFFIX"
          test -f "$EXT"
          php -d extension="$EXT" -r 'if (!extension_loaded("c2pa")) { fwrite(STDERR, "c2pa not loaded\n"); exit(1); } echo "ok\n";'

      - name: Run PHPT tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then SUFFIX=dylib; else SUFFIX=so; fi
          EXT="$PWD/target/debug/libc2pa.$SUFFIX"
          # `run-tests.php` parses TEST_PHP_ARGS by splitting on single spaces,
          # so the ini override must be `-d extension=...` (with the space).
          TEST_PHP_EXECUTABLE=$(which php) \
          TEST_PHP_ARGS="-d extension=$EXT" \
            php run-tests.php -q --show-diff tests/phpt
